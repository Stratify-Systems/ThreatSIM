name: ThreatSIM Continuous Integration

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-backend:
    name: Build Go Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Dependencies
        run: go mod download

      - name: Build Backend Binary
        run: CGO_ENABLED=0 GOOS=linux go build -o bin/threatsim ./cmd/threatsim/...

  build-frontend:
    name: Build React Dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Frontend Dependencies
        working-directory: ./dashboard
        run: bun install --frozen-lockfile

      - name: Build Frontend Application
        working-directory: ./dashboard
        run: bun run build

  build-docker-images:
    name: Build Docker Images (Compose)
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Images via Docker Compose
        run: |
          docker compose config
          docker compose build

  # ==========================================
  # SECURITY AS CODE PIPELINE ADDITION
  # ==========================================
  security-validation:
    name: ThreatSIM Detection Validation
    runs-on: ubuntu-latest
    needs: [build-docker-images]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Spin up entire Staging Infrastructure (ThreatSIM + Target App)
        run: |
          docker compose up -d --build
          # Wait a few seconds for services and DB to be healthy
          sleep 10

      - name: Run ThreatSIM Security Validation
        run: |
          ./scripts/ci-validation.sh brute_force http://localhost:8080 15 5s
