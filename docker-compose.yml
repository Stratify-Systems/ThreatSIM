
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: threatsim
      POSTGRES_USER: threatsim
      POSTGRES_PASSWORD: password123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threatsim"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
